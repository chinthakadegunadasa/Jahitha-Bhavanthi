name: Build Jahitha Bhavanthi

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
  workflow_dispatch:

jobs:
  build-manuscript:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended fonts-lklug-sinhala

      - name: Create Build Directory
        run: mkdir -p build

      - name: Execute Build Script
        run: |
          # Pandoc විධානය තනි පේළියකට සකස් කරන ලදී (Syntax දෝෂ මඟහැරීමට)
          pandoc src/*.md --pdf-engine=xelatex -V mainfont=LKLUG -V geometry:"paperwidth=176mm, paperheight=250mm, margin=20mm" --toc --toc-depth=3 --number-sections -o build/Jahitha_Bhavanthi_Master.pdf

      - name: Generate Docx Version
        run: |
          pandoc src/*.md -o build/Jahitha_Bhavanthi_Draft.docx

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Jahitha-Bhavanthi-Builds
          path: build/
          
